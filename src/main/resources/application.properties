# ==========================================
# APLICACAO
# ==========================================
spring.application.name=aep_parte2
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

# ==========================================
# BANCO DE DADOS (H2 - desenvolvimento)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# UPLOADS
# ==========================================
app.upload-dir=${UPLOAD_DIR:uploads/anexos}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ==========================================
# JWT
# ==========================================
api.security.jwt.secret=${JWT_SECRET:observacao-sistema-2026-chave-secreta-desenvolvimento}
api.security.jwt.expiration=86400000

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ==========================================
# SWAGGER
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
