# ==========================================
# APLICACAO
# ==========================================
spring.application.name=aep_parte2
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

# ==========================================
# BANCO DE DADOS (PostgreSQL)
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/observaacao}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# UPLOADS
# ==========================================
app.upload-dir=${UPLOAD_DIR:uploads/anexos}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ==========================================
# JWT
# ==========================================
api.security.jwt.secret=${JWT_SECRET:observacao-sistema-2026-chave-secreta-desenvolvimento}
api.security.jwt.expiration=86400000

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ==========================================
# SWAGGER
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
